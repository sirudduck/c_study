<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">
    컴파일 4단계 — 소스코드에서 실행파일까지
  </text>
  <text x="450" y="55" text-anchor="middle" font-size="13" fill="#6b7280">
    gcc hello.c -o hello 한 줄 안에 숨어있는 4단계
  </text>

  <!-- Stage boxes -->
  <!-- Stage 1: Source -->
  <g>
    <rect x="40" y="90" width="140" height="100" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="110" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">📝 원본 소스</text>
    <text x="110" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c2d12">hello.c</text>
    <text x="110" y="155" text-anchor="middle" font-size="10" fill="#7c2d12">#include &lt;stdio.h&gt;</text>
    <text x="110" y="172" text-anchor="middle" font-size="10" fill="#7c2d12">int main(void){...}</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="185" y1="140" x2="225" y2="140" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="205" y="130" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold">전처리</text>
  <text x="205" y="160" text-anchor="middle" font-size="9" fill="#6b7280">cpp / -E</text>

  <!-- Stage 2: Preprocessed -->
  <g>
    <rect x="230" y="90" width="140" height="100" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
    <text x="300" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a8a">📜 전처리 결과</text>
    <text x="300" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">hello.i</text>
    <text x="300" y="155" text-anchor="middle" font-size="10" fill="#1e40af">헤더 펼침</text>
    <text x="300" y="172" text-anchor="middle" font-size="10" fill="#1e40af">매크로 치환</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="375" y1="140" x2="415" y2="140" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="395" y="130" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold">컴파일</text>
  <text x="395" y="160" text-anchor="middle" font-size="9" fill="#6b7280">cc1 / -S</text>

  <!-- Stage 3: Assembly -->
  <g>
    <rect x="420" y="90" width="140" height="100" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="490" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">⚙️ 어셈블리</text>
    <text x="490" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">hello.s</text>
    <text x="490" y="155" text-anchor="middle" font-size="10" fill="#166534">mov, push, call</text>
    <text x="490" y="172" text-anchor="middle" font-size="10" fill="#166534">CPU 명령어</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="565" y1="140" x2="605" y2="140" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="585" y="130" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold">어셈블</text>
  <text x="585" y="160" text-anchor="middle" font-size="9" fill="#6b7280">as / -c</text>

  <!-- Stage 4: Object -->
  <g>
    <rect x="610" y="90" width="140" height="100" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="680" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">📦 오브젝트</text>
    <text x="680" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d28d9">hello.o</text>
    <text x="680" y="155" text-anchor="middle" font-size="10" fill="#6d28d9">기계어 바이너리</text>
    <text x="680" y="172" text-anchor="middle" font-size="10" fill="#6d28d9">미완성 (심볼)</text>
  </g>

  <!-- Arrow 4 -->
  <line x1="755" y1="140" x2="795" y2="140" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="775" y="130" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold">링크</text>
  <text x="775" y="160" text-anchor="middle" font-size="9" fill="#6b7280">ld</text>

  <!-- Stage 5: Executable -->
  <g>
    <rect x="800" y="90" width="80" height="100" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="840" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">🚀 실행</text>
    <text x="840" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#b91c1c">hello</text>
    <text x="840" y="158" text-anchor="middle" font-size="9" fill="#b91c1c">완성된</text>
    <text x="840" y="172" text-anchor="middle" font-size="9" fill="#b91c1c">실행 파일</text>
  </g>

  <!-- Multi-file section -->
  <text x="450" y="240" text-anchor="middle" font-size="16" font-weight="bold" fill="#111827">
    여러 파일이 있을 때 — 분할 컴파일의 위력
  </text>

  <!-- main.c -->
  <rect x="60" y="270" width="120" height="60" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="120" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">main.c</text>
  <text x="120" y="315" text-anchor="middle" font-size="10" fill="#7c2d12">+ calc.h 포함</text>

  <!-- calc.c -->
  <rect x="60" y="360" width="120" height="60" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="120" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">calc.c</text>
  <text x="120" y="405" text-anchor="middle" font-size="10" fill="#7c2d12">+ calc.h 포함</text>

  <!-- calc.h -->
  <rect x="60" y="450" width="120" height="50" rx="6" fill="#fde68a" stroke="#b45309" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="120" y="472" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c2d12">calc.h</text>
  <text x="120" y="490" text-anchor="middle" font-size="10" fill="#7c2d12">(헤더 — 공유)</text>

  <!-- Arrow main.c → main.o -->
  <line x1="185" y1="300" x2="290" y2="300" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <text x="237" y="290" text-anchor="middle" font-size="10" fill="#1e40af">gcc -c</text>

  <!-- Arrow calc.c → calc.o -->
  <line x1="185" y1="390" x2="290" y2="390" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <text x="237" y="380" text-anchor="middle" font-size="10" fill="#1e40af">gcc -c</text>

  <!-- Dashed link from header -->
  <line x1="120" y1="450" x2="120" y2="425" stroke="#b45309" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="120" y1="335" x2="120" y2="355" stroke="#b45309" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- main.o -->
  <rect x="295" y="270" width="120" height="60" rx="6" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="355" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">main.o</text>
  <text x="355" y="315" text-anchor="middle" font-size="10" fill="#6d28d9">기계어</text>

  <!-- calc.o -->
  <rect x="295" y="360" width="120" height="60" rx="6" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="355" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">calc.o</text>
  <text x="355" y="405" text-anchor="middle" font-size="10" fill="#6d28d9">기계어</text>

  <!-- Arrows to linker -->
  <line x1="420" y1="300" x2="540" y2="340" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="420" y1="390" x2="540" y2="350" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <text x="475" y="380" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">링커 ld</text>

  <!-- Final executable -->
  <rect x="550" y="320" width="140" height="60" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="620" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">🚀 calculator</text>
  <text x="620" y="365" text-anchor="middle" font-size="10" fill="#b91c1c">실행 파일</text>

  <!-- Key insight box -->
  <rect x="710" y="270" width="170" height="200" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="795" y="295" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a8a">💡 핵심</text>
  <text x="725" y="320" font-size="11" fill="#1e3a8a">main.c 만 수정?</text>
  <text x="725" y="338" font-size="11" font-weight="bold" fill="#1e3a8a">→ main.o 만 갱신</text>
  <text x="725" y="358" font-size="11" fill="#1e3a8a">→ 다시 링크</text>
  <text x="725" y="378" font-size="11" fill="#1e3a8a" font-style="italic">calc.o 는 재사용!</text>
  
  <line x1="730" y1="395" x2="870" y2="395" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="725" y="415" font-size="11" fill="#1e3a8a">3천만 줄 프로젝트에서</text>
  <text x="725" y="433" font-size="11" fill="#1e3a8a">한 줄 수정 시:</text>
  <text x="725" y="453" font-size="11" font-weight="bold" fill="#1e3a8a">전체 컴파일 (1시간)</text>
  <text x="725" y="468" font-size="11" font-weight="bold" fill="#15803d">→ 부분만 (수 초)</text>

  <!-- Bottom note -->
  <rect x="60" y="515" width="820" height="35" rx="6" fill="#f9fafb" stroke="#9ca3af" stroke-width="1"/>
  <text x="470" y="538" text-anchor="middle" font-size="12" fill="#374151">
    📌 헤더(.h)는 "메뉴판" — 무엇이 있는지 알림 | 소스(.c)는 "주방" — 실제 구현
  </text>
</svg>
